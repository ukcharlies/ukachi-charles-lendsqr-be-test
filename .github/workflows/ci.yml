name: CI
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          {
            MYSQL_DATABASE: demo_credit_test,
            MYSQL_USER: demo_credit,
            MYSQL_PASSWORD: demo_credit_test,
            MYSQL_ROOT_PASSWORD: root_test,
          }
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot_test"
          --health-interval=5s --health-timeout=3s --health-retries=20
    env:
      NODE_ENV: test
      PORT: 3000
      LOG_LEVEL: silent
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: demo_credit_test
      DB_USER: demo_credit
      DB_PASSWORD: demo_credit_test
      DB_SSL: false
      DB_POOL_MIN: 1
      DB_POOL_MAX: 5
      ADJUTOR_BASE_URL: https://adjutor.lendsqr.com
      ADJUTOR_API_KEY: test-only
      ADJUTOR_TIMEOUT_MS: 500
      AUTH_TOKEN_PEPPER: test-pepper-that-is-at-least-32-characters
      AUTH_TOKEN_TTL_DAYS: 30
      CORS_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run knex:migrate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
